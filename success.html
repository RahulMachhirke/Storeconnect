<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Order Success</title>

<style>
/* ===== Page Background ===== */
body {
    margin: 0;
    min-height: 100vh;
    font-family: "Segoe UI", Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #eef2f7, #dbeafe);
}

/* ===== Success Card ===== */
.success-card {
    width: 420px;
    background: white;
    padding: 30px;
    border-radius: 18px;
    box-shadow: 0 20px 45px rgba(0,0,0,0.15);
    text-align: center;
    animation: fadeIn 0.6s ease;
}

/* ===== Animation ===== */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* ===== Heading ===== */
.success-card h1 {
    color: #1e9e4a;
    margin-bottom: 10px;
}

/* ===== Order Info ===== */
.order-info {
    margin-top: 15px;
    text-align: left;
    font-size: 15px;
}

.order-info strong {
    display: block;
    margin-top: 10px;
}

/* ===== Button ===== */
.home-btn {
    margin-top: 25px;
    padding: 12px 26px;
    font-size: 15px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    color: white;
    background: linear-gradient(135deg, #42a5f5, #1e88e5);
    transition: 0.3s ease;
}

.home-btn:hover {
    opacity: 0.9;
    transform: scale(1.05);
}
</style>
</head>

<body>

<div class="success-card">
    <h1>✅ Order Placed Successfully</h1>
    <p>Thank you for using <strong>StoreConnect</strong></p>

    <div class="order-info">
        <strong>Order Type:</strong>
        <span id="orderRole"></span>

        <strong>Items Ordered:</strong>
        <ul id="orderItems"></ul>
    </div>

    <button class="home-btn" onclick="goHome()">Back to Home</button>
</div>

<script>
/* ===== Load order details from localStorage ===== */
const role = localStorage.getItem("orderRole") || "User";
const items = JSON.parse(localStorage.getItem("cartItems") || "{}");

document.getElementById("orderRole").textContent = role;

const list = document.getElementById("orderItems");

if (Object.keys(items).length === 0) {
    list.innerHTML = "<li>No items found</li>";
} else {
    for (let item in items) {
        const li = document.createElement("li");
        li.textContent = `${item}: ${items[item]}`;
        list.appendChild(li);
    }
}

/* ===== Go back to Home ===== */
function goHome() {
    localStorage.removeItem("cartItems");
    localStorage.removeItem("orderRole");
    window.location.href = "index.html";
}
</script>

</body>
</html>

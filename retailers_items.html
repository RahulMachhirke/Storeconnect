<!DOCTYPE html>
<html>
<head>
    <title>Retailer Available Items</title>
    <link rel="stylesheet" href="style.css">

    <style>
        .item-row {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }

        .item-row input[type="checkbox"] {
            margin-right: 10px;
        }

        .item-row span {
            width: 160px;
            display: inline-block;
        }

        .item-row input[type="number"] {
            width: 70px;
        }

        .container {
            width: 450px;
            margin: auto;
            padding-top: 20px;
        }

        button {
            width: 100%;
            background: green;
            color: white;
            padding: 10px;
            font-size: 18px;
            border-radius: 6px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>Retailer – Available Store Items</h1>

    <div id="retailerList">

        <div class="item-row">
            <input type="checkbox" value="Rice">
            <span>Rice</span>
            <input type="number" min="1" placeholder="Units">
        </div>

        <div class="item-row">
            <input type="checkbox" value="Wheat Flour">
            <span>Wheat Flour</span>
            <input type="number" min="1" placeholder="Units">
        </div>

        <div class="item-row">
            <input type="checkbox" value="Sugar">
            <span>Sugar</span>
            <input type="number" min="1" placeholder="Units">
        </div>

        <div class="item-row">
            <input type="checkbox" value="Salt">
            <span>Salt</span>
            <input type="number" min="1" placeholder="Units">
        </div>

        <div class="item-row">
            <input type="checkbox" value="Tea Powder">
            <span>Tea Powder</span>
            <input type="number" min="1" placeholder="Units">
        </div>

        <div class="item-row">
            <input type="checkbox" value="Coffee Powder">
            <span>Coffee Powder</span>
            <input type="number" min="1" placeholder="Units">
        </div>

        <div class="item-row">
            <input type="checkbox" value="Biscuit Packets">
            <span>Biscuit Packets</span>
            <input type="number" min="1" placeholder="Units">
        </div>

        <div class="item-row">
            <input type="checkbox" value="Chips">
            <span>Chips</span>
            <input type="number" min="1" placeholder="Units">
        </div>

        <div class="item-row">
            <input type="checkbox" value="Soft Drinks">
            <span>Soft Drinks</span>
            <input type="number" min="1" placeholder="Units">
        </div>

        <div class="item-row">
            <input type="checkbox" value="Cooking Oil">
            <span>Cooking Oil</span>
            <input type="number" min="1" placeholder="Litres">
        </div>

    </div>

    <button onclick="goToForm()">Next</button>

</div>

<script>
// Retailer cart object
let retailerCart = {};

// When user interacts, update cart
document.querySelectorAll('.item-row').forEach(row => {
    const checkbox = row.querySelector("input[type='checkbox']");
    const qty       = row.querySelector("input[type='number']");

    function updateCart() {
        if (checkbox.checked && qty.value.trim() !== "") {
            retailerCart[checkbox.value] = qty.value + " Units";
        } else {
            delete retailerCart[checkbox.value];
        }
    }

    checkbox.addEventListener("change", updateCart);
    qty.addEventListener("input", updateCart);
});

function goToForm() {
    if (Object.keys(retailerCart).length === 0) {
        alert("Please select at least one item before continuing.");
        return;
    }

    localStorage.setItem("cartItems", JSON.stringify(retailerCart));
    window.location.href = "form.html?role=Retailer";
}
</script>

</body>
</html>
